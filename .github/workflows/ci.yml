name: Tests

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'

  test:
    name: Test
    needs: changes
    # Run tests when source changes are detected, when manually dispatched,
    # or when a release tag (v*) is pushed. This ensures release-tag runs
    # execute the full test matrix instead of being skipped by the paths
    # filter.
    if: needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Compile
        run: pnpm run compile

      - name: Run tests
        run: xvfb-run -a pnpm test:coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml
        env:
          CI: true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-artifacts
          path: |
            out/
            dist/
            .vscode-test/
            coverage/
          retention-days: 7

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: Upload extension bundle
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: extension-bundle
          path: dist/extension.js
          retention-days: 7

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [test]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          result="${{ needs.test.result }}"
          if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
            echo "❌ test job ${result}"
            exit 1
          fi
          echo "✅ All required CI jobs passed or were skipped."
